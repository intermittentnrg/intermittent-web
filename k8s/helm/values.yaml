controllers:
  main:
    strategy: RollingUpdate
    containers:
      main:
        image:
          repository: docker-registry:5000/intermittent-web
          # tag: XXX
        envFrom:
          - secret: secret
        probes:
          liveness:
            enabled: true
            path: /health
            port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readiness:
            enabled: true
            path: /health
            port: http
            initialDelaySeconds: 5
            periodSeconds: 5

secrets:
  secret:
    enabled: true
    stringData:
      NODE_ENV: production
      PORT: "3000"

service:
  main:
    controller: main
    type: ClusterIP
    ports:
      http:
        port: 3000

ingress:
  main:
    annotations:
      nginx.ingress.kubernetes.io/enable-global-auth: "false"
      kubernetes.io/tls-acme: "true"
    className: nginx
    hosts:
      - host: intermittentnrg.int.mog.se
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
      - host: preview.intermittent.energy
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http
    tls:
      - hosts:
          - intermittentnrg.int.mog.se
        secretName: intermittentnrg.int.mog.se-tls
